<script>
function renderTransactions(txns) {
  const list = document.getElementById('txList');
  if (!txns || txns.length === 0) {
    list.innerHTML = '<div class="text-center text-on-surface-variant py-8">No transactions yet. Add your first entry above! 💜</div>';
    return;
  }
  list.innerHTML = txns.slice(-10).reverse().map(t => {
    const isIncome = t.type === 'income';
    const icon = isIncome ? 'trending_up' : 'shopping_cart';
    const colorClass = isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600';
    const amtColor = isIncome ? 'text-emerald-600' : 'text-rose-600';
    const sign = isIncome ? '+' : '-';
    return `<div class="bg-surface-container-lowest p-6 rounded-[1.5rem] flex items-center gap-5 transition-all hover:translate-x-1">
      <div class="w-14 h-14 ${colorClass} rounded-2xl flex items-center justify-center">
        <span class="material-symbols-outlined">${icon}</span>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-start">
          <h4 class="font-bold text-primary-container text-lg">${t.description || t.category}</h4>
          <span class="${amtColor} font-extrabold text-lg">${sign} ₹${Number(t.amount_inr).toLocaleString('en-IN')}</span>
        </div>
        <p class="text-on-surface-variant text-sm mt-1">${t.category}</p>
      </div>
    </div>`;
  }).join('');
}

async function loadDashboard() {
  try {
    const data = await apiFetch('/dashboard');
    if (data.success) renderTransactions(data.data.transactions);
  } catch(e) {
    document.getElementById('txList').innerHTML = '<div class="text-center text-rose-500 py-4">Could not load transactions.</div>';
  }
}

async function saveEntry() {
  const text = document.getElementById('txInput').value.trim();
  if (!text) return;
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('saveStatus');
  btn.disabled = true;
  btn.innerHTML = 'Saving... <span class="material-symbols-outlined">hourglass_empty</span>';
  status.textContent = '⏳ Analysing with AI...';
  status.classList.remove('hidden');
  try {
    const data = await apiFetch('/add-transaction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (data.success) {
      document.getElementById('txInput').value = '';
      status.textContent = '✅ Saved!';
      renderTransactions(data.dashboard.transactions);
    } else {
      status.textContent = '⚠️ ' + data.message;
    }
  } catch(e) {
    status.textContent = '❌ ' + e.message;
  }
  btn.disabled = false;
  btn.innerHTML = 'Save Entry <span class="material-symbols-outlined">arrow_forward</span>';
}

loadDashboard();
